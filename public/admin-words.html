<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>單字管理 | Word Quest</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/styles.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar"><div class="container"><a class="navbar-brand fw-bold" href="/admin.html"><span class="brand-dot me-2">A</span>管理後台</a><div class="d-flex gap-2"><a class="nav-link" href="/admin-users.html">帳號管理</a><span data-nav-user></span></div></div></nav>
  <main class="container py-4">
    <div id="messageBox" class="alert hidden"></div>
    <section class="panel p-4 mb-4">
      <h1 class="h4 fw-bold">新增 / 編輯單字</h1>
      <form id="wordForm" class="row g-2 align-items-end">
        <input type="hidden" name="id">
        <div class="col-md-2"><label class="form-label">冊別</label><input class="form-control" name="book" type="number" min="1" max="6" required></div>
        <div class="col-md-2"><label class="form-label">Unit</label><input class="form-control" name="unit" type="number" min="1" max="20" required></div>
        <div class="col-md-3"><label class="form-label">英文</label><input class="form-control" name="english" required></div>
        <div class="col-md-3"><label class="form-label">中文</label><input class="form-control" name="chinese" required></div>
        <div class="col-md-2"><button class="btn btn-dark w-100">儲存</button></div>
      </form>
    </section>
    <section class="panel p-4 mb-4">
      <h2 class="h5 fw-bold">批量匯入</h2>
      <form id="importForm" class="vstack gap-2">
        <textarea class="form-control" name="text" rows="6" placeholder="可貼上與單字.txt 相同格式的內容"></textarea>
        <button class="btn btn-outline-dark">匯入文字</button>
      </form>
    </section>
    <section class="panel p-4">
      <div class="d-flex flex-wrap gap-2 justify-content-between align-items-end mb-3">
        <h2 class="h5 fw-bold mb-0">題庫列表</h2>
        <form id="filterForm" class="d-flex gap-2">
          <input class="form-control" name="book" type="number" min="1" max="6" placeholder="冊">
          <input class="form-control" name="unit" type="number" min="1" max="20" placeholder="Unit">
          <button class="btn btn-outline-dark">篩選</button>
        </form>
      </div>
      <div class="table-responsive"><table class="table"><thead><tr><th>冊</th><th>Unit</th><th>英文</th><th>中文</th><th></th></tr></thead><tbody id="wordRows"></tbody></table></div>
    </section>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/admin-words.js"></script>
</body>
</html>
