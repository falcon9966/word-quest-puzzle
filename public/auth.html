<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登入註冊 | Word Quest</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/styles.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar"><div class="container"><a class="navbar-brand fw-bold" href="/"><span class="brand-dot me-2">W</span>Word Quest</a><span data-nav-user></span></div></nav>
  <main class="container py-5">
    <div id="messageBox" class="alert hidden"></div>
    <div class="row g-4">
      <section class="col-lg-6">
        <div class="panel p-4">
          <h2 class="h4 fw-bold">玩家登入</h2>
          <form id="loginForm" class="vstack gap-3 mt-3">
            <input class="form-control" name="username" placeholder="帳號" required>
            <input class="form-control" name="password" type="password" placeholder="密碼" required>
            <button class="btn btn-dark">登入</button>
          </form>
          
        </div>
      </section>
      <section class="col-lg-6">
        <div class="panel p-4">
          <h2 class="h4 fw-bold">註冊帳號</h2>
          <form id="registerForm" class="vstack gap-3 mt-3">
            <input class="form-control" name="username" placeholder="帳號" required>
            <input class="form-control" name="nickname" placeholder="暱稱" required>
            <input class="form-control" name="password" type="password" placeholder="密碼至少 4 碼" required>
            <button class="btn btn-outline-dark">註冊</button>
          </form>
        </div>
      </section>
    </div>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
