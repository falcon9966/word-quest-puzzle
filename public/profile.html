<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>個人中心 | Word Quest</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/styles.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar"><div class="container"><a class="navbar-brand fw-bold" href="/"><span class="brand-dot me-2">W</span>Word Quest</a><div class="d-flex gap-2"><a class="nav-link" href="/game.html">闖關</a><span data-nav-user></span></div></div></nav>
  <main class="container py-4">
    <div id="messageBox" class="alert hidden"></div>
    <div class="row g-4">
      <section class="col-md-4"><div class="panel stat p-4"><div class="text-secondary">累計積分</div><div id="score" class="display-5 fw-bold">0</div></div></section>
      <section class="col-md-4"><div class="panel stat p-4"><div class="text-secondary">已通關</div><div id="completed" class="display-5 fw-bold">0</div></div></section>
      <section class="col-md-4"><div class="panel stat p-4"><div class="text-secondary">目前解鎖</div><div id="unlocked" class="display-5 fw-bold">1</div></div></section>
    </div>
    <section class="panel p-4 mt-4">
      <h1 class="h4 fw-bold">歷史作答記錄</h1>
      <div class="table-responsive"><table class="table"><thead><tr><th>關卡</th><th>答案</th><th>結果</th><th>時間</th></tr></thead><tbody id="attemptRows"></tbody></table></div>
    </section>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
